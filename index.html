<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting Portal</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>

  <style>
    body {
      /* Clean native system font stack (no external cool fonts) */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
    }

    .dapp-container {
      max-width: 680px;
    }

    /* Elegant Minimalist White Cards */
    .elegant-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      transition: box-shadow 0.2s ease;
    }

    .elegant-card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
    }

    /* Minimalist Dark Button */
    .btn-dark-elegant {
      background-color: #0f172a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      padding: 0.6rem 1.25rem;
      transition: background-color 0.15s ease;
    }
    
    .btn-dark-elegant:hover {
      background-color: #1e293b;
      color: #ffffff;
    }

    /* Clean Secondary Wireframe Button */
    .btn-outline-elegant {
      border: 1px solid #cbd5e1;
      background-color: #ffffff;
      color: #334155;
      border-radius: 6px;
      font-weight: 500;
      padding: 0.4rem 1rem;
      transition: all 0.15s ease;
    }

    .btn-outline-elegant:hover {
      background-color: #f1f5f9;
      border-color: #94a3b8;
      color: #0f172a;
    }

    /* Clean Inputs */
    .form-control-elegant {
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #0f172a;
      padding: 0.6rem 1rem;
    }

    .form-control-elegant:focus {
      border-color: #64748b;
      box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.1);
      outline: none;
    }

    .form-control-elegant::placeholder {
      color: #94a3b8;
    }

    /* Simple Wallet Status Pill */
    .status-badge {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background-color: #ef4444; /* Disconnected State */
    }

    .connected .dot-indicator {
      background-color: #10b981; /* Connected State */
    }

    /* Clean List Layout */
    .candidate-item {
      background-color: #ffffff;
      border: 1px solid #e2e8f0 !important;
      border-radius: 8px !important;
      color: #0f172a;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1.25rem;
    }

    .vote-count-badge {
      background-color: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    h1, h3, h4 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>

  <div class="container dapp-container py-5">
    
    <header class="text-center mb-5">
      <h1 class="mb-2">Voting Portal</h1>
      <p class="text-muted small">Decentralized application cryptographic ballot.</p>
      
      <div class="mt-4">
        <div class="status-badge" id="statusWrapper">
          <span class="dot-indicator" id="statusDot"></span>
          <span id="account" class="small text-muted">Not connected</span>
        </div>
        <div class="mt-2">
          <button class="btn btn-outline-elegant btn-sm px-3" onclick="connectMetaMask()">
            Connect Wallet
          </button>
        </div>
      </div>
    </header>

    <section class="elegant-card mb-4">
      <h4 class="small text-uppercase text-muted tracking-wider mb-2">Administration</h4>
      <h3 class="fs-5 mb-3">Add Ballot Candidate</h3>
      <div class="input-group gap-2">
        <input 
          type="text" 
          id="candidateInput" 
          class="form-control form-control-elegant" 
          placeholder="Enter candidate name..." 
          aria-label="Candidate Name"
        />
        <button class="btn btn-dark-elegant" onclick="addCandidate()">
          Add Candidate
        </button>
      </div>
    </section>

    <section class="elegant-card">
      <h4 class="small text-uppercase text-muted tracking-wider mb-2">Live Board</h4>
      <h3 class="fs-5 mb-3">Ballot Registry</h3>
      
      <ul id="candidates" class="list-group list-group-flush mt-2">
        </ul>
    </section>

  </div>

  <script src="app.js"></script>

  <script>
    const accountEl = document.getElementById('account');
    const statusWrapper = document.getElementById('statusWrapper');
    const observer = new MutationObserver(() => {
      if (accountEl.textContent.trim() !== "Not connected") {
        statusWrapper.classList.add('connected');
        accountEl.classList.replace('text-muted', 'text-dark');
      } else {
        statusWrapper.classList.remove('connected');
        accountEl.classList.replace('text-dark', 'text-muted');
      }
    });
    observer.observe(accountEl, { childList: true, characterData: true, subtree: true });
  </script>
</body>
</html>
