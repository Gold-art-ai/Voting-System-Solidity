<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voting DApp</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">🗳️ Voting DApp</h1>

    <div class="mb-3 text-center">
      <p id="account" class="fw-semibold text-primary">Not connected</p>
      <button class="btn btn-outline-primary me-2" onclick="connectMetaMask()">🔌 Connect MetaMask</button>
    </div>

    <div class="card p-4 shadow-sm mb-4">
      <h4>Add Candidate</h4>
      <div class="input-group mb-3">
        <input type="text" id="candidateInput" class="form-control" placeholder="Enter Candidate Name" />
        <button class="btn btn-success" onclick="addCandidate()">➕ Add</button>
      </div>
    </div>

    <div class="card p-4 shadow-sm">
      <h4>📋 Candidates</h4>
      <ul id="candidates" class="list-group mt-3"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
